services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cursive
      POSTGRES_PASSWORD: cursive_dev_password
      POSTGRES_DB: cursive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cursive"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    environment:
      # Docker Desktop on Windows is slow (sometimes effectively stuck)
      # binding the full 50000-60000 UDP range. Local dev only ever has a
      # couple of participants at once, so a much narrower range is plenty
      # and binds in a couple of seconds instead of minutes. Must match the
      # port mapping below — LiveKit only offers ICE candidates within
      # whatever range it's told here.
      - LIVEKIT_RTC_PORT_RANGE_START=50000
      - LIVEKIT_RTC_PORT_RANGE_END=50100
      # Without this, LiveKit advertises its own container-internal Docker
      # network IP (e.g. 172.18.0.3) as the address to send media to — a
      # browser on the host can never reach that, so calls connect
      # signaling but then silently fail to establish the actual audio/
      # video path. Browser and server share this machine via Docker
      # Desktop's published ports, so 127.0.0.1 is the address that's
      # actually reachable.
      - LIVEKIT_RTC_USE_EXTERNAL_IP=false
      - LIVEKIT_RTC_NODE_IP=127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

volumes:
  postgres_data:
